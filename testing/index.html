<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive List Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Interactive List Builder</h1>
    
    <div class="form-section">
      <h2>Add Items</h2>
      
      <div class="form-group">
        <label for="category">Category:</label>
        <select id="category">
          <option value="">-- Select Category --</option>
          <option value="fruit">Fruit</option>
          <option value="vegetable">Vegetable</option>
          <option value="grain">Grain</option>
        </select>
      </div>

      <div class="form-group">
        <label for="item">Item:</label>
        <select id="item" disabled>
          <option value="">-- Select Item --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="quantity">Quantity:</label>
        <select id="quantity">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="10">10</option>
        </select>
      </div>

      <button id="addBtn" class="btn-primary">Add Item</button>
    </div>

    <div class="list-section">
      <div class="list-header">
        <h2>Shopping List</h2>
        <span class="item-count" id="itemCount">0 items</span>
      </div>

      <ul class="item-list" id="itemList"></ul>

      <div class="list-actions">
        <button id="clearBtn" class="btn-secondary">Clear All</button>
        <button id="exportBtn" class="btn-secondary">Export as JSON</button>
      </div>
    </div>

    <div class="stats-section">
      <h3>Statistics</h3>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Total Items:</span>
          <span class="stat-value" id="totalItems">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Total Quantity:</span>
          <span class="stat-value" id="totalQuantity">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Categories:</span>
          <span class="stat-value" id="categoriesCount">0</span>
        </div>
      </div>
    </div>
  </div>

  <script src="model.js"></script>
  <script src="script.js"></script>
</body>
</html>
